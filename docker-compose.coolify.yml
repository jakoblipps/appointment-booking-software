services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-appointment_booking}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-appointment_booking}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      ORIGIN: ${PUBLIC_APP_URL}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL}
      WEBAUTHN_ALLOWED_ORIGINS: ${WEBAUTHN_ALLOWED_ORIGINS}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-appointment_booking}
      POSTGRES_DB: ${POSTGRES_DB:-appointment_booking}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Open Reception}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
    expose:
      - "3000"
    labels:
      - traefik.enable=true
      # Admin / Hauptdomain
      - traefik.http.routers.openreception-main.rule=Host(`openreception.kontrollfeld.com`)
      - traefik.http.routers.openreception-main.entrypoints=https
      - traefik.http.routers.openreception-main.tls=true
      - traefik.http.routers.openreception-main.tls.certresolver=letsencrypt
      - traefik.http.routers.openreception-main.service=openreception
      # Tenant-Subdomain "frauenaerzte"
      - traefik.http.routers.openreception-frauenaerzte.rule=Host(`frauenaerzte.openreception.kontrollfeld.com`)
      - traefik.http.routers.openreception-frauenaerzte.entrypoints=https
      - traefik.http.routers.openreception-frauenaerzte.tls=true
      - traefik.http.routers.openreception-frauenaerzte.tls.certresolver=letsencrypt
      - traefik.http.routers.openreception-frauenaerzte.service=openreception
      # Service definition – beide Router zeigen hierhin
      - traefik.http.services.openreception.loadbalancer.server.port=3000
    healthcheck:
      test:
        ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
